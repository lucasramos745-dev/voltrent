<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoltRent — Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Estilos extras apenas para o login */
    .login-dica {
      margin-top: 20px;
      padding: 12px 16px;
      background: var(--verde-claro);
      border: 1px solid var(--verde-borda);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--verde-hover);
      text-align: center;
    }

    .login-loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 20px;
      background: var(--cinza-medio);
      color: var(--cinza);
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      width: 100%;
      cursor: not-allowed;
    }

    @keyframes girar {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #ccc;
      border-top-color: var(--cinza);
      border-radius: 50%;
      animation: girar .7s linear infinite;
    }
  </style>
</head>
<body class="login-page">

  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <span>🛵 VoltRent</span>
    </div>
    <p class="login-subtitulo">Sistema de Gestão de Locações</p>

    <!-- Formulário -->
    <h2>Entrar na sua conta</h2>

    <form id="form-login">

      <div class="campo">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="seu@email.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>

      <!-- Mensagem de erro -->
      <p id="erro-login" class="erro" style="display:none; margin-bottom: 12px;"></p>

      <!-- Botão de entrar -->
      <button type="submit" class="btn-primario" id="btn-entrar">
        🔐 Entrar
      </button>

      <!-- Estado de carregando -->
      <div class="login-loading" id="btn-loading">
        <div class="spinner"></div>
        Entrando...
      </div>

    </form>

    <!-- Dica para primeiro acesso -->
    <div class="login-dica">
      💡 Primeiro acesso? Crie um usuário em:<br>
      Firebase Console → Authentication → Usuários
    </div>

  </div>

  <!-- ================================================
       JAVASCRIPT DO LOGIN
       ================================================ -->
  <script type="module">
    import { login, redirecionarSeLogado } from "./js/auth.js";

    // Se já estiver logado, vai direto para o dashboard
    redirecionarSeLogado();

    const form       = document.getElementById("form-login");
    const btnEntrar  = document.getElementById("btn-entrar");
    const btnLoading = document.getElementById("btn-loading");
    const erroMsg    = document.getElementById("erro-login");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;

      // Mostra estado de carregando
      btnEntrar.style.display  = "none";
      btnLoading.style.display = "flex";
      erroMsg.style.display    = "none";

      try {
        await login(email, senha);
        // login() já redireciona para dashboard.html em caso de sucesso
      } catch (err) {
        // Mostra erro e restaura o botão
        erroMsg.textContent    = err.message;
        erroMsg.style.display  = "block";
        btnEntrar.style.display  = "flex";
        btnLoading.style.display = "none";
      }
    });
  </script>

</body>
</html>
